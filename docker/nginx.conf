server {
    listen 80;
    # Changed to include port in the server_name for better matching
    server_name localhost:5173;
    
    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Root directory and index files
    root /usr/share/nginx/html;
    index index.html;
    
    # Handle API requests - proxy to backend
    location /api/ {
        proxy_pass http://service-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Add port-specific configuration
    port_in_redirect off;  # Prevent Nginx from adding the port to redirects
    
    # Remove trailing slashes
    rewrite ^/(.*)/$ /$1 permanent;
    
    # Add this to handle CORS for exact URLs
    add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;
    
    # Specific route for playground.html (no trailing slash)
    location = /playground {
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        try_files /playground.html /playground/index.html;
    }
    
    # Backwards compatibility for /playground/ with trailing slash
    location /playground/ {
        try_files $uri $uri/ /playground.html;
    }
    
    # Specific route for create-pipeline.html (no trailing slash)
    location = /create-pipeline {
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        try_files /create-pipeline.html /create-pipeline/index.html;
    }
    
    # Backwards compatibility for /create-pipeline/ with trailing slash
    location /create-pipeline/ {
        try_files $uri $uri/ /create-pipeline.html;
    }
    
    # This will serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Error handling
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
