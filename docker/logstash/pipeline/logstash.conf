# filepath: d:\study\ArtificialInsight\docker\logstash\pipeline\logstash.conf
input {
  beats {
    port => 5044
  }
  
  udp {
    port => 5000
    codec => json
  }
}

filter {
  # Handle Filebeat logs with Docker metadata
  if [container][name] {
    mutate {
      add_field => { "service_name" => "%{[container][name]}" }
    }
    
    # Clean up container name (remove docker- prefix and suffix)
    mutate {
      gsub => [ "service_name", "^docker[-_]", "" ]
      gsub => [ "service_name", "[-_]\d+$", "" ]
    }
  }
  
  # Parse JSON messages from both Filebeat and UDP inputs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "json"
    }
    
    # Move parsed JSON fields to top level
    if [json] {
      mutate {
        rename => { 
          "[json][timestamp]" => "log_timestamp"
          "[json][level]" => "log_level" 
          "[json][service]" => "service_name"
          "[json][name]" => "logger_name"
          "[json][message]" => "log_message"
          "[json][grpc_method]" => "grpc_method"
          "[json][request_id]" => "request_id"
          "[json][user_id]" => "user_id"
          "[json][target_service]" => "target_service"
          "[json][method]" => "method"
          "[json][status]" => "status"
          "[json][duration_ms]" => "duration_ms"
          "[json][exception]" => "exception"
        }
      }
      
      # Use parsed timestamp if available
      if [log_timestamp] {
        date {
          match => [ "log_timestamp", "ISO8601" ]
        }
      }
      
      # Remove the json object after extraction
      mutate {
        remove_field => [ "json" ]
      }
    }
  }
  
  # Handle UDP logs that come as JSON directly
  if [service_name] and ![log_message] {
    mutate {
      rename => { "message" => "log_message" }
    }
  }
  
  # Set default log level if not present
  if ![log_level] {
    mutate {
      add_field => { "log_level" => "INFO" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "microservices-logs-%{+YYYY.MM.dd}"
  }
}
