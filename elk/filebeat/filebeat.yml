filebeat.inputs:
- type: container
  paths:
    - '/var/lib/docker/containers/*/*.log'
  processors:
    - add_docker_metadata:
        host: "unix:///var/run/docker.sock"
    - decode_json_fields:
        fields: ["message"]
        target: "json"
        overwrite_keys: true
        max_depth: 10
    - timestamp:
        field: json.timestamp
        layouts:
          - '2006-01-02T15:04:05.000Z'
          - '2006-01-02T15:04:05Z'
        test:
          - '2025-01-20T10:30:00.000Z'

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  - add_fields:
      target: ''
      fields:
        environment: 'development'
        project: 'artificialinsight'
  - rename:
      fields:
        - from: "container.name"
          to: "service_name"
      ignore_missing: true
  - drop_fields:
      fields: ["agent", "ecs", "host", "log.file"]

output.logstash:
  hosts: ["logstash:5044"]

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644

setup.kibana:
  host: "kibana:5601"

monitoring.enabled: true
monitoring.elasticsearch:
  hosts: ["elasticsearch:9200"]
