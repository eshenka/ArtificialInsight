name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      userdb: ${{ steps.filter.outputs.userdb }}
      service_api: ${{ steps.filter.outputs.service_api }}
      vectorDB : ${{ steps.filter.outputs.vectorDB  }}
      controller: ${{ steps.filter.outputs.controller }}
      scraping: ${{ steps.filter.outputs.scraping }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed directories
        id: filter
        uses: dorny/paths-filter@v3.0.2 # Pinned to a specific v3 patch version
        with:
          filters: |
            userdb:
              - 'userdb/**'
            service_api:
              - 'service_api/**'
            vectorDB:
              - 'vectorDB/**'
            controller:
              - 'controller/**'
            scraping:
              - 'scraping/**'
            frontend:
              - 'frontend/**'

  test-userdb:
    needs: detect-changes
    if: needs.detect-changes.outputs.userdb == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Run tests
        run: |
          cd userdb
          cargo test

  test-service-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.service_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd service-api
          pip install -r requirements.txt
          pip install pytest # Ensure pytest is installed if not in requirements
      - name: Run tests
        run: |
          cd service-api
          pytest --no-test-found-exit-code=0

  test-vectorDB:
    needs: detect-changes
    if: needs.detect-changes.outputs.vectorDB  == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd vectorDB 
          pip install -r requirements.txt
          pip install pytest # Ensure pytest is installed if not in requirements
      - name: Run tests
        run: |
          cd vectorDB 
          pytest --no-test-found-exit-code=0

  test-controller:
    needs: detect-changes
    if: needs.detect-changes.outputs.controller == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd controller
          pip install -r requirements.txt
          pip install pytest # Ensure pytest is installed if not in requirements
      - name: Run tests
        run: |
          cd controller
          pytest --no-test-found-exit-code=0

  test-scraping:
    needs: detect-changes
    if: needs.detect-changes.outputs.scraping == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd scraping
          pip install -r requirements.txt
          pip install pytest # Ensure pytest is installed if not in requirements
      - name: Run tests
        run: |
          cd scraping
          pytest --no-test-found-exit-code=0

  test-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4 # This sets up Python. If frontend tests are JS-based, this should be actions/setup-node
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd frontend
          pip install -r requirements.txt # If this is a Python test setup for frontend, ensure pytest is here or installed separately
          pip install pytest # Ensure pytest is installed
      - name: Run tests
        run: |
          cd frontend
          pytest --no-test-found-exit-code=0 # If frontend tests are JS, this command should be npm test or similar
