name: SonarQube Analysis

on:
  push:
    branches: [main, production, dev, dev-sonar]
  pull_request:
    branches: [main, production, dev]
  workflow_dispatch:

jobs:
  python-syntax-check: # Renamed from python-coverage
    name: Python Syntax Check # Renamed
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [controller, scraping, service_api, vectorDB]
    defaults:
      run:
        working-directory: ${{ matrix.component }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.component }}/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m compileall -q .

  rust-clippy-analysis: # Renamed from rust-coverage
    name: Rust Clippy Analysis # Renamed
    runs-on: ubuntu-latest
    outputs:
      clippy_report_generated: steps.clippy_report.outcome == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy
          override: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run Clippy and generate report
        id: clippy_report
        run: cargo clippy --manifest-path userdb/Cargo.toml --message-format=json > clippy-report.json || true

      - name: Upload Clippy report
        uses: actions/upload-artifact@v4
        with:
          name: clippy-report-artifact
          path: clippy-report.json

  react-eslint-analysis: # Renamed from react-coverage
    name: React ESLint Analysis # Renamed
    runs-on: ubuntu-latest
    outputs:
      eslint_report_generated: steps.eslint_report.outcome == 'success'
    # Removed job-level defaults for working-directory to be more explicit
    # defaults:
    #   run:
    #     working-directory: webui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display directory structure at root
        run: |
          echo "Running in $PWD"
          echo "Listing contents of workspace root:"
          ls -la
          echo "Checking for webui directory:"
          if [ -d "webui" ]; then
            echo "webui directory exists. Contents:"
            ls -la webui
          else
            echo "ERROR: webui directory does NOT exist at $PWD/webui"
            # Optionally, fail the job if webui is critical and missing
            # exit 1 
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          # cache: 'npm' # Убрано для отключения кэширования npm
          # cache-dependency-path: webui/package-lock.json # Убрано, так как кэширование отключено
    

      - name: Install dependencies in webui
        working-directory: webui # Explicitly set for this step
        run: |
          echo "Current directory for npm install: $(pwd)"
          echo "Listing contents of webui before npm install:"
          ls -la
          echo "Attempting npm install..."
          npm install
  
      - name: Install eslint-plugin-react
        working-directory: webui # Explicitly set for this step
        run: npm install eslint-plugin-react@latest

      - name: Lint React code
        working-directory: webui # Explicitly set for this step
        id: eslint_report
        run: npm run lint || true # Assumes "lint" script in package.json generates eslint-report.json

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report-artifact
          path: webui/eslint-report.json # Path to the generated report
      
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [rust-clippy-analysis, react-eslint-analysis] # Depends on jobs producing reports
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarQube needs full history

      - name: Download Clippy report
        if: needs.rust-clippy-analysis.outputs.clippy_report_generated == 'success'
        uses: actions/download-artifact@v4
        with:
          name: clippy-report-artifact
          # path: . # Download to current dir (default)

      - name: Download ESLint report
        if: needs.react-eslint-analysis.outputs.eslint_report_generated == 'success'
        uses: actions/download-artifact@v4
        with:
          name: eslint-report-artifact
          path: webui # Скачиваем содержимое артефакта в директорию webui

      - name: Setup SonarQube Scanner
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=eshenka_ArtificialInsight
            -Dsonar.projectName=ArtificialInsight
            -Dsonar.organization=eshenka
            -Dsonar.sources=.
            -Dsonar.python.version=3.11
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/target/**,**/*.pb.go,**/*.proto
            -Dsonar.rust.clippy.reportPaths=clippy-report.json
            -Dsonar.eslint.reportPaths=webui/eslint-report.json
            -Dsonar.sourceEncoding=UTF-8

      - name: Verify SonarQube scan report exists
        run: |
          echo "Checking if .scannerwork/report-task.txt exists..."
          if [ -f ".scannerwork/report-task.txt" ]; then
            echo "✅ .scannerwork/report-task.txt found"
            echo "File size: $(stat -c%s .scannerwork/report-task.txt) bytes"
            echo "File contents:"
            cat .scannerwork/report-task.txt
          else
            echo "❌ .scannerwork/report-task.txt NOT found"
            echo "Contents of .scannerwork directory:"
            ls -la .scannerwork/ || echo "❌ .scannerwork directory does not exist"
            exit 1
          fi

      - name: Upload SonarQube scan report
        uses: actions/upload-artifact@v4
        with:
          name: sonar-scan-report
          path: .scannerwork/report-task.txt
          if-no-files-found: error # Fails the workflow if the file is not found

  sonar-quality-gate:
    name: SonarQube Quality Gate Check
    runs-on: ubuntu-latest
    needs: sonar
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download SonarQube scan report
        uses: actions/download-artifact@v4
        with:
          name: sonar-scan-report
          path: .

      - name: Display report-task.txt content
        run: |
          echo "Contents of report-task.txt:"
          cat report-task.txt

      - name: Extract ceTaskId from report
        id: extract_task_id
        run: |
          TASK_ID=$(grep 'ceTaskId=' report-task.txt | cut -d'=' -f2)
          echo "Extracted Task ID: $TASK_ID"
          echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT

      - name: Wait for SonarQube analysis to complete
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          TASK_ID="${{ steps.extract_task_id.outputs.task_id }}"
          echo "Waiting for SonarQube task $TASK_ID to complete..."
          
          # Wait for task completion (max 5 minutes)
          for i in {1..30}; do
            echo "Checking task status (attempt $i/30)..."
            RESPONSE=$(curl -s -u "$SONAR_TOKEN:" "https://sonarcloud.io/api/ce/task?id=$TASK_ID")
            STATUS=$(echo "$RESPONSE" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            
            echo "Current status: $STATUS"
            
            if [ "$STATUS" = "SUCCESS" ]; then
              echo "✅ SonarQube analysis completed successfully"
              break
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "❌ SonarQube analysis failed with status: $STATUS"
              exit 1
            else
              echo "⏳ Analysis still in progress, waiting 10 seconds..."
              sleep 10
            fi
          done
          
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "❌ Timeout waiting for SonarQube analysis to complete"
            exit 1
          fi

      - name: Check Quality Gate Status
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "Checking Quality Gate status for project: eshenka_ArtificialInsight"
          
          # Get Quality Gate status
          QG_RESPONSE=$(curl -s -u "$SONAR_TOKEN:" \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=eshenka_ArtificialInsight")
          
          echo "Quality Gate API Response:"
          echo "$QG_RESPONSE"
          
          # Extract Quality Gate status
          QG_STATUS=$(echo "$QG_RESPONSE" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
          
          echo "Quality Gate Status: $QG_STATUS"
          
          if [ "$QG_STATUS" = "OK" ]; then
            echo "✅ Quality Gate PASSED"
          elif [ "$QG_STATUS" = "ERROR" ]; then
            echo "❌ Quality Gate FAILED"
            
            # Extract failed conditions for better error reporting
            echo "Failed conditions:"
            echo "$QG_RESPONSE" | grep -o '"conditions":\[[^]]*\]' || echo "No detailed conditions found"
            
            exit 1
          else
            echo "⚠️ Quality Gate status unknown: $QG_STATUS"
            exit 1
          fi

      - name: Report Quality Gate Results
        if: always()
        run: |
          echo "=== SonarQube Quality Gate Check Complete ==="
          echo "Project: eshenka_ArtificialInsight"
          echo "Dashboard: https://sonarcloud.io/dashboard?id=eshenka_ArtificialInsight"
          echo "For detailed results, visit the SonarCloud dashboard above."
