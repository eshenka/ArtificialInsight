name: SonarQube Analysis

on:
  push:
    branches: [main, production, dev, dev-sonar]
  pull_request:
    branches: [main, production, dev]
  workflow_dispatch:

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Настройка SonarQube Scanner
      - name: Setup SonarQube Scanner
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Assuming you have this secret
        with:
          args: >
            -Dsonar.projectKey=ArtificialInsight
            -Dsonar.projectName=ArtificialInsight
            -Dsonar.organization=your-organization-key # Replace with your actual SonarCloud organization key
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/target/**,**/*.pb.go,**/*.proto
            -Dsonar.python.coverage.reportPaths=**/coverage.xml
            -Dsonar.rust.clippy.reportPaths=**/clippy-report.json
            -Dsonar.sourceEncoding=UTF-8

  python-coverage:
    name: Python Coverage # Consider renaming this job to "Python Syntax Check" for clarity
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [controller, scraping, service_api, vectorDB]
    defaults:
      run:
        working-directory: ${{ matrix.component }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' # Enable pip caching
          # Cache key will be specific to the component's requirements.txt
          cache-dependency-path: ${{ matrix.component }}/requirements.txt

      - name: Install dependencies
        run: |
          # cd ${{ matrix.component }} # No longer needed due to defaults.run.working-directory
          pip install -r requirements.txt
          # pip install --upgrade pytest>=6.0 pytest-cov # Removed pytest and pytest-cov installation

      - name: Check Python syntax
        run: |
          # cd ${{ matrix.component }} # No longer needed due to defaults.run.working-directory
          python -m compileall -q .

  rust-coverage:
    name: Rust Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy
          override: true

      - name: Run Clippy and generate report
        run: cargo clippy --manifest-path userdb/Cargo.toml --message-format=json > clippy-report.json || true
        # The '|| true' ensures that the workflow continues even if Clippy finds issues,
        # allowing the report to be uploaded for SonarQube analysis.

      - name: Upload Clippy report
        uses: actions/upload-artifact@v4
        with:
          name: clippy-report
          path: clippy-report.json

  react-coverage: # Consider renaming this job to "React Linting" for clarity
    name: React Coverage # Consider renaming this to "React Linting"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List root directory contents
        run: ls -la
        working-directory: ${{ github.workspace }} # Run at the root

      - name: List webui directory contents
        run: ls -la webui || echo "webui directory not found or ls failed"
        working-directory: ${{ github.workspace }} # Run at the root, list webui

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm' # Enable npm caching
          # Verify this path. If you use yarn, it should be 'webui/yarn.lock'.
          # If using pnpm, it should be 'webui/pnpm-lock.yaml'.
          # Check the output of the 'List webui directory contents' step above.
          cache-dependency-path: webui/package-lock.json

      - name: Install dependencies
        run: |
          # ls -la # This was for debugging 'cd webui', removed as 'cd' is commented.
          # cd webui # No longer needed due to defaults.run.working-directory
          npm install

      - name: Lint React code # Renamed step
        run: |
          # cd webui # No longer needed due to defaults.run.working-directory
          npm run lint # Assumes a "lint" script in package.json

  sonar-quality-gate:
    name: SonarQube Quality Gate
    needs: [sonar]
    runs-on: ubuntu-latest

    steps:
      - name: Check Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
          # Не заставляем CI/CD прерываться, если Quality Gate не проходит
          # В реальном проекте можно установить true для строгого контроля качества
          fail_if_gate_not_green: false